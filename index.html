<!DOCTYPE html>
<html>
    <head>
        <title>Virtual Harp</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="media.css">

    </head>
    
    <body>
        <div class="main">
            <div class="song-selector">
            <div id="player"></div>
            <div class="playlist" id="songList"></div>  

            </div>
            <div class="canvas">
                <video class="input_video" style="display:none;position:absolute" ></video>
                <canvas class="output_canvas"></canvas>
            </div>
            <div class="right">
                <button id="open-composer-btn" class="wood-button">
                    🎸 調音與音色設定
                </button>
                
                <div id="composer-slot"></div>
            </div>
        </div>
        <div class="function">
           <div class="song-info">
                <h2 style="color :#ccc;">請從左側選歌</h2>
           </div>
        </div>
        
        <!--mediapipe src-->
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/webmidi@3.1.1/dist/iife/webmidi.iife.js"></script>
        <!--web synth-->
        <script type="module">
            import MidiSynth from 'https://tsai1010.github.io/scripts/midisynth-gui.js';
        </script>
        <!--tone.js-->
        <script src="https://unpkg.com/tone"></script>
        <script src="https://unpkg.com/@tonejs/midi"></script>
        <!--self js file-->
        <script src="song.js"></script><script src="roll.js"></script>
        <script src="midiHandler.js"></script>
        <script src="harp.js"></script>
        <script src="skeletons.js"></script>
        <script src="scripts.js?v=0.0.2"></script>
        <!--youtube-->
        <script src="https://www.youtube.com/iframe_api"></script>
    </body>
</html>
