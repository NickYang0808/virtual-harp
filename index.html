<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <title>Virtual Harp</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="media.css">

    </style>
    </head>
    
    <body>
    <nav class="navbar navbar-dark bg-dark position-relative py-1 shadow-sm">
        <div class="container-fluid d-flex justify-content-center">
            <span class="navbar-brand mb-0 h1 text-info" style="font-size: 1.2rem;">Virtual Harp AR System</span>
            <span class="badge bg-secondary position-absolute end-0 me-3">虛擬豎琴伴奏系統 v(beta) 0.0.1</span>
        </div>
    </nav>

    <div class="container-fluid main-container">
        <div class="row h-100 g-3">
            
            <div class="col-lg-2 col-md-4 d-flex flex-column h-100">
                <div class="side-panel p-2 d-flex flex-column shadow">
                    <div id="player" class="rounded overflow-hidden mb-2 shadow-sm" style="width:100% !important; height:200px !important;"></div>
                    <h6 class="p-2 border-bottom border-secondary text-info">🎵 播放清單</h6>
                    <div id="songList" class="flex-grow-1 overflow-auto custom-scrollbar">
                        </div>
                </div>
            </div>

            <div class="col-lg-8 col-md-8 h-100">
                <div class="canvas-wrapper h-100 d-flex align-items-center justify-content: center">
                    <video class="input_video" style="display:none;"></video>
                    <canvas class="output_canvas w-100 h-auto" style="max-height:100%; object-fit: contain;"></canvas>

                    <div id="detection-guide" class="d-none w-100 h-100 position-absolute d-flex flex-column align-items-center justify-content-center"
                        style="background: rgba(0,0,00.6); top: 0; left: 0; z-index: 10;">
                        <div class="text-center p-4 rounded-3" style="border: 2px dashed #99FF13; background: rgba(0,0,0,0.8);">
                            <h3 style="color: #99FF13; margin-bottom: 10px;">⚠️ 未偵測到演奏者</h3>
                            <p class="text-white mb-0">請確保「頭部」與「雙肩」位於攝影機畫面內</p>
                            <small style="color: #aaa;">保持約 1.5 ~ 2 公尺距離效果最佳</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-2 col-md-12">
                <div class="side-panel p-3 shadow">
                    <button id="open-composer-btn" class="btn btn-outline-info w-100 mb-3 shadow-sm">
                        ⚙️ 調音與音色設定
                    </button>
                    <div id="composer-slot" class="rounded bg-black bg-opacity-25 p-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid mt-1" style="height: 20vh;">
        <div class="row justify-content-center h-100">
            <div class="col-lg-8 col-md-8">
                <div class="song-info d-flex flex-column align-items-center justify-content-center h-100 rounded shadow-sm border border-info border-opacity-25 bg-opacity-50">
                    <h2 class="text-secondary opacity-50">請從左側選歌</h2>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webmidi@3.1.1/dist/iife/webmidi.iife.js"></script>
    
    <script type="module">
        import MidiSynth from 'https://tsai1010.github.io/scripts/midisynth-gui.js';
        window.synth = new MidiSynth('#composer-slot');
    </script>
    
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="song.js"></script>
    <script src="roll.js"></script>
    <script src="midiHandler.js"></script>
    <script src="harp.js"></script>
    <script src="skeletons.js"></script>
    <script src="scripts.js?v=0.0.2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
